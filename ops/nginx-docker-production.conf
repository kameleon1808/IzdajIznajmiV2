server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    resolver 127.0.0.11 ipv6=off valid=10s;

    set $backend_upstream http://backend:8000;
    set $reverb_upstream http://reverb:8080;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Laravel API + Sanctum endpoints
    # Security headers (X-Content-Type-Options, X-Frame-Options, Referrer-Policy,
    # Permissions-Policy, HSTS, CSP) are emitted by Laravel's SecurityHeadersMiddleware.
    # Do not duplicate them here to avoid sending the same header twice.
    location /api/ {
        proxy_pass $backend_upstream;
    }

    location /sanctum/ {
        proxy_pass $backend_upstream;
    }

    location /broadcasting/ {
        proxy_pass $backend_upstream;
    }

    location /storage/ {
        proxy_pass $backend_upstream;
    }

    # Reverb websocket endpoint
    location /app/ {
        proxy_pass $reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    # Vue SPA — served as static files from frontend/dist (built on host).
    # Security headers added here since no Laravel middleware runs for these responses.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), interest-cohort=()" always;
    }
}
